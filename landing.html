<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>80sGrid.com</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#0a0704;height:100dvh;display:flex;align-items:center;justify-content:center;}
.page{width:100%;max-width:390px;height:100dvh;max-height:844px;display:flex;flex-direction:column;overflow:hidden;}
.gold-rule{height:3px;background:linear-gradient(90deg,#0a0704,#c9a84c,#f0d080,#c9a84c,#0a0704);flex-shrink:0;}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px 4px;gap:8px;min-height:0;}
.pb-icon{width:150px;height:150px;object-fit:cover;border-radius:50%;border:4px solid #c9a84c;box-shadow:0 0 0 2px #6b4c1a,0 6px 30px rgba(0,0,0,0.9);flex-shrink:0;}
.q-block{width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;min-height:0;}
.q-eyebrow{font-family:'Special Elite',serif;font-size:0.62em;color:#c9a84c;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;width:100%;}
.q-eyebrow::before,.q-eyebrow::after{content:'';flex:1;height:1px;background:#c9a84c55;}
.question-text{font-family:'Bebas Neue',sans-serif;font-size:1.95em;color:#f0e8d0;line-height:1.1;letter-spacing:1.5px;text-shadow:2px 2px 8px rgba(0,0,0,0.9);margin-bottom:12px;}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.ans{background:#1c1209;border:1.5px solid #c9a84c;border-radius:4px;padding:13px 8px;font-family:'Barlow Condensed',sans-serif;font-size:1.05em;font-weight:700;color:#f0e8d0;cursor:pointer;text-align:center;letter-spacing:1px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;line-height:1.2;}
.ans:active{transform:scale(0.96);}
.ans.correct{background:#0f2e10;border-color:#5cb85c;color:#a5d6a7;}
.ans.wrong{background:#2e0f0f;border-color:#8b1a1a;color:#ef9a9a;}
.reveal{width:100%;font-family:'Special Elite',serif;font-size:0.88em;color:#f0e8d0;line-height:1.55;text-align:left;max-height:0;overflow:hidden;opacity:0;transition:max-height 0.4s ease,opacity 0.35s;}
.reveal.show{max-height:100px;opacity:1;margin-top:8px;padding:9px 12px;background:rgba(201,168,76,0.15);border-radius:3px;border-left:4px solid #c9a84c;}
.bottom{flex-shrink:0;padding:8px 20px 14px;display:flex;flex-direction:column;gap:5px;}
.cta-btn{display:block;width:100%;background:#8b1a1a;color:#f0e8d0;text-decoration:none;padding:15px 20px 13px;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:2.1em;letter-spacing:3px;text-align:center;white-space:nowrap;border-top:2px solid #c9a84c;border-left:1px solid #c9a84c55;border-right:1px solid #c9a84c55;border-bottom:1px solid #6b1a1a;box-shadow:0 4px 16px rgba(0,0,0,0.6);-webkit-tap-highlight-color:transparent;}
.cta-btn:active{transform:scale(0.98);}
.btn-sub{display:block;font-family:'Special Elite',serif;font-size:0.3em;letter-spacing:3px;opacity:0.75;margin-top:2px;text-transform:uppercase;white-space:nowrap;}
.footer-note{text-align:center;font-family:'Special Elite',serif;font-size:0.58em;color:#5c4e35;letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
