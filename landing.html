<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>80sGrid.com – Pat Benatar Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Barlow+Condensed:wght@700&family=Barlow:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Barlow', sans-serif;
  background: #0a0704;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page {
  width: 100%;
  max-width: 390px;
  height: 100dvh;
  max-height: 844px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER IMAGE — full width, no cropping */
.header-img {
  width: 100%;
  height: auto;
  max-height: 130px;
  object-fit: contain;
  object-position: center center;
  display: block;
  flex-shrink: 0;
  background: #1a0d00;
}

/* GOLD RULE */
.gold-rule {
  height: 3px;
  background: linear-gradient(90deg, #0a0704, #c9a84c, #f0d080, #c9a84c, #0a0704);
  flex-shrink: 0;
}

/* CENTER SECTION */
.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 18px 4px;
  gap: 8px;
}

/* PB ICON */
.pb-icon {
  width: 96px;
  height: 96px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #c9a84c;
  box-shadow: 0 0 0 1px #6b4c1a, 0 4px 20px rgba(0,0,0,0.8);
  flex-shrink: 0;
}

/* QUESTION BLOCK */
.q-block {
  width: 100%;
  text-align: center;
}

.q-eyebrow {
  font-family: 'Special Elite', serif;
  font-size: 0.62em;
  color: #c9a84c;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.q-eyebrow::before,
.q-eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #c9a84c55;
}

.question-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.05em;
  color: #f0e8d0;
  line-height: 1.1;
  letter-spacing: 1.5px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  margin-bottom: 14px;
}

/* ANSWERS */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
}

.ans {
  background: #1c1209;
  border: 1.5px solid #c9a84c;
  border-radius: 4px;
  padding: 14px 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.05em;
  font-weight: 700;
  color: #f0e8d0;
  cursor: pointer;
  text-align: center;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.2;
}
.ans:hover  { background: #2e1f0a; }
.ans:active { transform: scale(0.96); }
.ans.correct { background: #0f2e10; border-color: #5cb85c; color: #a5d6a7; }
.ans.wrong   { background: #2e0f0f; border-color: #8b1a1a; color: #ef9a9a; }

/* REVEAL */
.reveal {
  width: 100%;
  font-family: 'Special Elite', serif;
  font-size: 0.85em;
  color: #f0e8d0;
  line-height: 1.5;
  text-align: center;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.35s;
  padding: 0 4px;
}
.reveal.show {
  max-height: 120px;
  opacity: 1;
  margin-top: 6px;
}

/* BOTTOM */
.bottom {
  flex-shrink: 0;
  padding: 8px 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cta-btn {
  display: block;
  width: 100%;
  background: #8b1a1a;
  color: #f0e8d0;
  text-decoration: none;
  padding: 16px 20px 14px;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2em;
  letter-spacing: 5px;
  text-align: center;
  border-top: 2px solid #c9a84c;
  border-left: 1px solid #c9a84c55;
  border-right: 1px solid #c9a84c55;
  border-bottom: 1px solid #6b1a1a;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.cta-btn:active { transform: scale(0.98); }

.btn-sub {
  display: block;
  font-family: 'Special Elite', serif;
  font-size: 0.32em;
  letter-spacing: 3px;
  opacity: 0.75;
  margin-top: 2px;
  text-transform: uppercase;
}

.footer-note {
  text-align: center;
  font-family: 'Special Elite', serif;
  font-size: 0.58em;
  color: #5c4e35;
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>

      <div class="answers" id="answers">

        <div class="ans" onclick="pick(this,true)">An Opera Singer</div>

<script>
function pick(el, correct) {
  document.querySelectorAll('.ans').forEach(function(a) {
    a.onclick = null;
    a.style.cursor = 'default';
  });
  var reveal = document.getElementById('reveal');
  if (correct) {
    el.classList.add('correct');
    reveal.innerHTML = '&#10003; Correct! Before rock grabbed her, Benatar trained as a classical singer headed for opera. That voice came from somewhere. Now go prove the rest.';
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.ans').forEach(function(a) {
      if (a.textContent.trim() === 'An Opera Singer') a.classList.add('correct');
    });
    reveal.innerHTML = '&#10007; Not quite. It was opera. Pat Benatar trained as a classical singer before rock changed everything. Head to the grid.';
  }
  reveal.classList.add('show');
}
</script>
