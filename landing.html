<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>80sGrid.com – Pat Benatar Edition</title>
<meta property="og:title" content="80sGrid.com – Can You Beat Pat Benatar Trivia?">
<meta property="og:description" content="Think you know your 80s music? Start with Pat Benatar. Play free now.">
<meta property="og:image" content="https://raw.githubusercontent.com/80sGrid/80sgrid.github.io/main/images/header26.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1208;
  --paper: #f0e8d0;
  --cream: #e8dbb8;
  --gold: #c9a84c;
  --red: #8b1a1a;
  --shadow: #2d1f0e;
  --muted: #6b5c3e;
}

html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Barlow', sans-serif;
  background-color: var(--ink);
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    ),
    radial-gradient(ellipse at top, #2a1f10 0%, #0d0a06 60%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
}

.page {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 20px 18px 24px;
}

/* Masthead */
.masthead {
  text-align: center;
  border-bottom: 1px solid var(--gold);
  padding-bottom: 10px;
  margin-bottom: 14px;
}

.pub-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.2em;
  letter-spacing: 6px;
  color: var(--paper);
  line-height: 1;
  text-shadow: 2px 2px 0 var(--shadow);
}

.pub-sub {
  font-family: 'Special Elite', serif;
  font-size: 0.72em;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

.dateline {
  font-family: 'Special Elite', serif;
  font-size: 0.62em;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 6px;
}

/* Header image */
.icon-wrap {
  text-align: center;
  margin: 6px 0 10px;
  position: relative;
}

.header-img {
  width: 100%;
  max-height: 140px;
  object-fit: cover;
  object-position: center top;
  display: block;
  border-radius: 3px;
  filter: sepia(30%) contrast(1.05);
  border: 1px solid rgba(201,168,76,0.4);
}

/* Headline */
.headline-block {
  border-top: 3px double var(--gold);
  border-bottom: 3px double var(--gold);
  padding: 10px 0;
  margin-bottom: 14px;
  text-align: center;
}

.kicker {
  font-family: 'Special Elite', serif;
  font-size: 0.65em;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.0em;
  color: var(--paper);
  line-height: 1.1;
  letter-spacing: 2px;
  text-shadow: 1px 1px 0 var(--shadow);
}

.deck {
  font-family: 'Special Elite', serif;
  font-size: 0.78em;
  color: var(--cream);
  line-height: 1.5;
  margin-top: 6px;
  opacity: 0.85;
}

/* Question Card */
.question-card {
  background: var(--paper);
  border: 1px solid var(--gold);
  border-radius: 4px;
  padding: 16px 14px 14px;
  margin-bottom: 14px;
  position: relative;
  box-shadow: 4px 4px 0 var(--shadow), inset 0 0 40px rgba(0,0,0,0.06);
}

.question-card::before {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 1px solid rgba(201,168,76,0.3);
  pointer-events: none;
  border-radius: 2px;
}

.q-label {
  font-family: 'Special Elite', serif;
  font-size: 0.6em;
  color: var(--red);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.q-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--red);
  opacity: 0.4;
}

.question-text {
  font-family: 'Special Elite', serif;
  font-size: 1.05em;
  color: var(--ink);
  line-height: 1.5;
  margin-bottom: 14px;
}

/* Answer buttons */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.ans {
  background: var(--ink);
  border: 1px solid var(--gold);
  border-radius: 3px;
  padding: 12px 8px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.82em;
  font-weight: 600;
  color: var(--cream);
  cursor: pointer;
  text-align: center;
  line-height: 1.3;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent;
}

.ans:active { transform: scale(0.97); }

.ans:hover { background: #2d2010; }

.ans.correct {
  background: #1a3d1a;
  border-color: #4caf50;
  color: #a5d6a7;
}

.ans.wrong {
  background: #3d1a1a;
  border-color: var(--red);
  color: #ef9a9a;
}

.reveal {
  margin-top: 12px;
  font-family: 'Special Elite', serif;
  font-size: 0.82em;
  color: var(--ink);
  line-height: 1.5;
  min-height: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s;
  opacity: 0;
  background: rgba(201,168,76,0.15);
  border-radius: 3px;
}

.reveal.show {
  max-height: 200px;
  opacity: 1;
  padding: 10px 12px;
}

/* CTA */
.cta-section {
  text-align: center;
}

.cta-btn {
  display: block;
  width: 100%;
  background: var(--red);
  color: var(--paper);
  text-decoration: none;
  padding: 18px 20px;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7em;
  letter-spacing: 4px;
  border: 1px solid rgba(201,168,76,0.5);
  box-shadow: 3px 3px 0 var(--shadow);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}

.cta-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transition: left 0.5s;
}

.cta-btn:hover::after { left: 150%; }

.cta-btn:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 var(--shadow);
}

.btn-sub {
  display: block;
  font-family: 'Special Elite', serif;
  font-size: 0.38em;
  letter-spacing: 3px;
  opacity: 0.8;
  margin-top: 2px;
}

.footer-note {
  margin-top: 12px;
  font-family: 'Special Elite', serif;
  font-size: 0.62em;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* divider */
.rule {
  border: none;
  border-top: 1px solid rgba(201,168,76,0.25);
  margin: 14px 0;
}

/* Answered state — unlock CTA */
.cta-section { transition: opacity 0.4s; }

@media (max-height: 700px) {
  .icon-wrap { display: none; }
  .page { padding-top: 14px; }
}
</style>
</head>
<body>
<div class="page">



  <div class="icon-wrap">
    <img class="header-img"
         src="https://raw.githubusercontent.com/80sGrid/80sgrid.github.io/main/images/header26.jpg"
         alt="Len's 80sGrid.com"
         onerror="this.style.display='none'">
  </div>



  <div class="question-card">
    <div class="q-label">Your question</div>
    <div class="question-text">Before she became a rock star, Pat Benatar was formally trained to be what?</div>
    <div class="answers" id="answers">
      <div class="ans" onclick="pick(this, false)">An actress</div>
      <div class="ans" onclick="pick(this, true)">An opera singer</div>
      <div class="ans" onclick="pick(this, false)">A dancer</div>
      <div class="ans" onclick="pick(this, false)">A schoolteacher</div>
    </div>
    <div class="reveal" id="reveal"></div>
  </div>

  <div class="cta-section" id="cta">
    <a href="https://80sgrid.com" class="cta-btn">
      Play Free Now
      <span class="btn-sub">80sGrid.com &nbsp;|&nbsp; No sign-up needed</span>
    </a>
    <div class="footer-note">New quizzes added regularly &nbsp;·&nbsp; 100% free</div>
  </div>

</div>

<script>
function pick(el, correct) {
  var all = document.querySelectorAll('.ans');
  var reveal = document.getElementById('reveal');
  all.forEach(function(a) { a.onclick = null; a.style.cursor = 'default'; });

  if (correct) {
    el.classList.add('correct');
    reveal.innerHTML = '<strong>Correct.</strong> Before rock and roll, Benatar studied classical voice and was headed for an opera career. Then she heard the music and changed course. The rest is history. Now go test everything else you think you know.';
  } else {
    el.classList.add('wrong');
    all.forEach(function(a) {
      if (a.textContent.trim() === 'An opera singer') a.classList.add('correct');
    });
    reveal.innerHTML = '<strong>Close, but no.</strong> Pat Benatar trained as an opera singer before rock and roll grabbed her. That classical background is exactly what gave her that voice. Head to the grid and see what else you\'ve got.';
  }
  reveal.classList.add('show');
}
</script>
</body>
</html>
