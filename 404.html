<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 80sGrid</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a0533 0%, #0d001a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.container { text-align: center; max-width: 480px; }
.logo { font-family: 'Oxanium', sans-serif; font-size: 2.2em; font-weight: 900; color: #FF1493; letter-spacing: 3px; margin-bottom: 8px; }
.logo span { color: #8B00FF; }
.oops { font-family: 'Oxanium', sans-serif; font-size: 5em; font-weight: 900; color: white; line-height: 1; margin: 16px 0 8px; }
.message { font-size: 1em; color: rgba(255,255,255,0.7); margin-bottom: 8px; line-height: 1.5; }
.submessage { font-size: 0.85em; color: rgba(255,255,255,0.4); margin-bottom: 32px; font-style: italic; }
.home-btn { display: inline-block; padding: 14px 36px; background: linear-gradient(135deg, #FF1493, #8B00FF); color: white; text-decoration: none; border-radius: 30px; font-family: 'Oxanium', sans-serif; font-weight: 900; font-size: 1em; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(255,20,147,0.4); transition: transform 0.15s; }
.home-btn:hover { transform: translateY(-2px); }
.countdown { font-size: 0.78em; color: rgba(255,255,255,0.35); margin-top: 20px; }
</style>
<script>
  // Auto-redirect after 5 seconds
  let secs = 5;
  window.onload = function() {
    const el = document.getElementById('countdown');
    const timer = setInterval(function() {
      secs--;
      if (el) el.textContent = 'Taking you home in ' + secs + ' second' + (secs !== 1 ? 's' : '') + '...';
      if (secs <= 0) { clearInterval(timer); window.location.href = '/'; }
    }, 1000);
  };
</script>
</head>
<body>
<div class="container">
  <div class="logo">80s<span>Grid</span></div>
  <div class="oops">404</div>
  <div class="message">Whoa — that page doesn't exist.<br>Maybe it got lost somewhere in the 80s. 🎸</div>
  <div class="submessage">"This is not a love song." — PIL</div>
  <a href="/" class="home-btn">&#127968; Take Me Home</a>
  <div class="countdown" id="countdown">Taking you home in 5 seconds...</div>
</div>
</body>
</html>
