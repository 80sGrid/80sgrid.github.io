<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;900&family=Archivo+Black&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #8B00FF;
    --pink: #FF1493;
    --gold: #FFD700;
    --green: #28a745;
    --orange: #fd7e14;
    --red: #dc3545;
    --dark: #0a0a0f;
    --card: #13131f;
    --border: rgba(139,0,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: white;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Animated grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(139,0,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,0,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 50px 0 30px;
  }

  .header-eyebrow {
    font-family: 'Oxanium', sans-serif;
    font-size: 0.7em;
    letter-spacing: 6px;
    color: var(--pink);
    text-transform: uppercase;
    margin-bottom: 12px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
    99% { opacity: 1; }
  }

  .header-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(2em, 7vw, 3.5em);
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 40%, var(--pink) 70%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .header-sub {
    font-size: 0.75em;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .header-divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    margin: 20px auto;
    border-radius: 2px;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 14px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-label {
    font-family: 'Oxanium', sans-serif;
    font-size: 0.7em;
    color: var(--pink);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 3px;
    transition: width 0.6s ease;
    width: 0%;
  }
  .progress-count {
    font-family: 'Oxanium', sans-serif;
    font-size: 0.75em;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  /* SURVEY CARD */
  .survey-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .survey-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .survey-card.answered {
    border-color: rgba(139,0,255,0.5);
  }
  .survey-card.answered::before { opacity: 1; }

  .survey-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'Oxanium', sans-serif;
    font-size: 0.65em;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  .survey-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(0.9em, 3vw, 1.1em);
    line-height: 1.3;
    margin-bottom: 20px;
    padding-right: 50px;
    color: white;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option {
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .option:hover {
    transform: scale(1.02);
    filter: brightness(1.15);
  }

  .option.voted { cursor: default; }
  .option.voted:hover { transform: none; filter: none; }

  .option-icon {
    font-size: 1.4em;
    min-width: 36px;
    height: 36px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .option-text { flex: 1; }
  .option-label {
    font-family: 'Oxanium', sans-serif;
    font-size: 0.78em;
    font-weight: 900;
    letter-spacing: 1px;
    color: white;
  }
  .option-sub {
    font-size: 0.68em;
    opacity: 0.8;
    margin-top: 2px;
    color: white;
    font-family: 'Space Mono', monospace;
  }

  /* Bar reveal */
  .option-bar-wrap {
    display: none;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    min-width: 52px;
  }
  .option-pct {
    font-family: 'Oxanium', sans-serif;
    font-size: 0.85em;
    font-weight: 900;
    color: white;
  }
  .option-bar-track {
    width: 52px;
    height: 5px;
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    overflow: hidden;
  }
  .option-bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.8s ease;
  }

  .option.selected {
    box-shadow: 0 0 20px rgba(255,20,147,0.5), inset 0 0 12px rgba(255,255,255,0.05);
  }
  .option.selected::after {
    content: '✓';
    position: absolute;
    top: 8px; right: 10px;
    font-size: 0.85em;
    color: white;
    font-family: 'Oxanium', sans-serif;
    font-weight: 900;
  }

  /* COMPLETION BADGE */
  .completion-badge {
    display: none;
    text-align: center;
    padding: 14px;
    margin-top: 14px;
    background: rgba(40,167,69,0.1);
    border: 1px solid rgba(40,167,69,0.3);
    border-radius: 10px;
    font-family: 'Oxanium', sans-serif;
    font-size: 0.75em;
    color: #28a745;
    letter-spacing: 2px;
  }

  /* ALL DONE */
  .all-done {
    display: none;
    text-align: center;
    padding: 50px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
  }
  .all-done-emoji { font-size: 3em; margin-bottom: 16px; }
  .all-done-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.5em;
    background: linear-gradient(135deg, var(--gold), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .all-done-sub {
    font-size: 0.75em;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 30px 0 10px;
    font-size: 0.65em;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    font-family: 'Oxanium', sans-serif;
  }
  .footer a { color: var(--pink); text-decoration: none; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .survey-card { animation: cardIn 0.4s ease both; }
  .survey-card:nth-child(1)  { animation-delay: 0.05s; }
  .survey-card:nth-child(2)  { animation-delay: 0.1s; }
  .survey-card:nth-child(3)  { animation-delay: 0.15s; }
  .survey-card:nth-child(4)  { animation-delay: 0.2s; }
  .survey-card:nth-child(5)  { animation-delay: 0.25s; }
  .survey-card:nth-child(6)  { animation-delay: 0.3s; }
  .survey-card:nth-child(7)  { animation-delay: 0.35s; }
  .survey-card:nth-child(8)  { animation-delay: 0.4s; }
  .survey-card:nth-child(9)  { animation-delay: 0.45s; }
  .survey-card:nth-child(10) { animation-delay: 0.5s; }
  .survey-card:nth-child(11) { animation-delay: 0.55s; }
  .survey-card:nth-child(12) { animation-delay: 0.6s; }
</style>
</head>

let answered = 0;
const STORAGE_KEY = '80sgrid_surveys_preview';

function getAnswered() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveAnswer(id, value) {
  const a = getAnswered(); a[id] = value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(a));
}

function updateProgress() {
  const pct = (answered / SURVEYS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = answered + ' / ' + SURVEYS.length;
  if (answered === SURVEYS.length) {
    setTimeout(() => { document.getElementById('allDone').style.display = 'block'; }, 600);
  }
}

function revealResults(card, survey, chosen) {
  card.classList.add('answered');
  card.querySelectorAll('.option').forEach(opt => {
    opt.classList.add('voted');
    opt.style.cursor = 'default';
    const val = opt.dataset.value;
    const pct = parseInt(opt.dataset.pct);
    const isChosen = val === chosen;
    if (isChosen) opt.classList.add('selected');
    else opt.style.opacity = '0.6';
    const barWrap = opt.querySelector('.option-bar-wrap');
    if (barWrap) {
      barWrap.style.display = 'flex';
      const fill = barWrap.querySelector('.option-bar-fill');
      barWrap.querySelector('.option-pct').textContent = pct + '%';
      setTimeout(() => { if(fill) fill.style.width = pct + '%'; }, 80);
    }
  });
  const badge = card.querySelector('.completion-badge');
  if (badge) badge.style.display = 'block';
}

function handleVote(card, survey, value) {
  saveAnswer(survey.id, value);
  answered++;
  updateProgress();
  revealResults(card, survey, value);
}

function buildCard(survey, savedAnswer) {
  const card = document.createElement('div');
  card.className = 'survey-card';
  card.innerHTML = `
    <div class="survey-num">${(SURVEYS.indexOf(survey)+1).toString().padStart(2,'0')} / ${SURVEYS.length}</div>
    <div class="survey-title">${survey.title}</div>
    <div class="options">
      ${survey.options.map(opt => `
        <div class="option" data-value="${opt.value}" data-pct="${opt.pct}"
          style="background:${opt.bg}; border-color:${opt.border};">
          <div class="option-icon">${opt.icon}</div>
          <div class="option-text">
            <div class="option-label">${opt.label}</div>
            ${opt.sub ? `<div class="option-sub">${opt.sub}</div>` : ''}
          </div>
          <div class="option-bar-wrap">
            <div class="option-pct">0%</div>
            <div class="option-bar-track">
              <div class="option-bar-fill" style="background:${opt.color};"></div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="completion-badge">✓ ANSWERED — THANKS FOR PLAYING!</div>
  `;

  if (savedAnswer) {
    answered++;
    revealResults(card, survey, savedAnswer);
  } else {
    card.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        if (card.classList.contains('answered')) return;
        handleVote(card, survey, opt.dataset.value);
      });
    });
  }
  return card;
}

function init() {
  const saved = getAnswered();
  const list = document.getElementById('surveyList');
  SURVEYS.forEach(s => list.appendChild(buildCard(s, saved[s.id] || null)));
  updateProgress();
}

init();
</script>
