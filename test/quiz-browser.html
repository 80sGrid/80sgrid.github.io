<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80sGrid Quiz Browser</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 30px 20px; }
h1 { font-family: 'Oxanium', sans-serif; color: white; text-align: center; font-size: 2em; letter-spacing: 3px; margin-bottom: 6px; }
p { text-align: center; color: rgba(255,255,255,0.7); font-size: 0.85em; margin-bottom: 24px; }
.filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-btn { padding: 8px 20px; border: 2px solid rgba(255,255,255,0.4); background: transparent; color: white; border-radius: 20px; cursor: pointer; font-size: 0.85em; font-weight: bold; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: white; color: #667eea; border-color: white; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-width: 1100px; margin: 0 auto; }
.quiz-card { background: white; border-radius: 12px; padding: 14px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: transform 0.15s, box-shadow 0.15s; border: 3px solid transparent; }
.quiz-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
.quiz-card.easy   { border-color: #28a745; }
.quiz-card.medium { border-color: #fd7e14; }
.quiz-card.hard   { border-color: #dc3545; }
.quiz-num { font-family: 'Oxanium', sans-serif; font-size: 1.1em; font-weight: 900; color: #8B00FF; margin-bottom: 4px; }
.quiz-title { font-size: 0.82em; font-weight: 700; color: #333; margin-bottom: 6px; line-height: 1.3; }
.quiz-artists { font-size: 0.72em; color: #888; line-height: 1.4; }
.quiz-diff { display: inline-block; font-size: 0.65em; font-weight: 900; padding: 2px 8px; border-radius: 10px; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }
.easy   .quiz-diff { background: #d4edda; color: #155724; }
.medium .quiz-diff { background: #fff3cd; color: #856404; }
.hard   .quiz-diff { background: #f8d7da; color: #721c24; }
.count { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.8em; margin-bottom: 16px; }
</style>
</head>
<body>
<h1>🎸 80sGrid Quiz Browser</h1>
<p>All 70 quizzes — click to play</p>
<div class="filters">
  <button class="filter-btn active" onclick="filter('all')">All (70)</button>
  <button class="filter-btn" onclick="filter('easy')">🟢 Easy</button>
  <button class="filter-btn" onclick="filter('medium')">🟠 Medium</button>
  <button class="filter-btn" onclick="filter('hard')">🔴 Hard</button>
</div>
<div class="count" id="count">Showing 70 quizzes</div>
<div class="grid" id="grid"></div>

<script src="quiz-data.js"></script>
<script>
let currentFilter = 'all';

function filter(d) {
  currentFilter = d;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const QDATA = window.QUIZ_DATA || [];
  const filtered = currentFilter === 'all' ? QDATA : QDATA.filter(q => q.d === currentFilter);
  document.getElementById('count').textContent = `Showing ${filtered.length} quizzes`;
  document.getElementById('grid').innerHTML = filtered.map(q => `
    <a class="quiz-card ${q.d}" href="quiz-template.html?id=${q.n}">
      <div class="quiz-num">#${String(q.n).padStart(3,'0')}</div>
      <div class="quiz-title">${q.t}</div>
      <div class="quiz-artists">${q.a.join(' · ')}</div>
      <span class="quiz-diff">${q.d}</span>
    </a>
  `).join('');
}

renderGrid();
</script>
</body>
</html>
