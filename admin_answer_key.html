<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80sGrid Admin — Answer Key</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --accent: #ff1493;
    --accent2: #00ffcc;
    --accent3: #ffd700;
    --text: #e0e0f0;
    --muted: #666680;
    --easy: #00cc66;
    --medium: #ff8800;
    --hard: #ff3366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,20,147,0.03) 40px, rgba(255,20,147,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,204,0.03) 40px, rgba(0,255,204,0.03) 41px);
  }

  /* LOGIN SCREEN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 30px;
  }
  .login-box {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,20,147,0.3), inset 0 0 30px rgba(255,20,147,0.05);
    max-width: 400px;
    width: 90%;
  }
  .login-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1em;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255,20,147,0.8);
  }
  .login-sub {
    color: var(--muted);
    font-size: 0.75em;
    letter-spacing: 2px;
    margin-bottom: 35px;
  }
  .login-input {
    width: 100%;
    background: #1a1a2e;
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1em;
    letter-spacing: 4px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }
  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,20,147,0.4);
  }
  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 14px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.9em;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .login-btn:hover { background: #ff69b4; box-shadow: 0 0 20px rgba(255,20,147,0.6); }
  .login-error { color: var(--hard); font-size: 0.8em; letter-spacing: 1px; margin-top: 12px; display: none; }

  /* MAIN ADMIN */
  #adminScreen { display: none; }

  .top-bar {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: 0 4px 30px rgba(255,20,147,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1em;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(255,20,147,0.6);
    white-space: nowrap;
  }
  .top-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* SEARCH & FILTER */
  .search-input {
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85em;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--muted); }

  .filter-select {
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85em;
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent2); }

  /* QUIZ DROPDOWN LIST */
  .quiz-dropdown {
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85em;
    outline: none;
    cursor: pointer;
    min-width: 280px;
  }
  .quiz-dropdown:focus { border-color: var(--accent); }

  /* MAIN CONTENT */
  .main-content {
    padding: 30px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* QUIZ CARD */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .quiz-card:hover { border-color: var(--accent); }
  .quiz-card.highlighted { border-color: var(--accent2); box-shadow: 0 0 20px rgba(0,255,204,0.2); }

  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .card-header:hover { background: rgba(255,20,147,0.05); }
  .card-header.open { border-bottom-color: var(--border); }

  .quiz-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75em;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    min-width: 60px;
  }
  .quiz-name {
    flex: 1;
    font-size: 0.95em;
    color: var(--text);
    letter-spacing: 1px;
  }
  .quiz-artists {
    color: var(--muted);
    font-size: 0.78em;
    flex: 1;
  }
  .diff-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72em;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .diff-Easy { background: rgba(0,204,102,0.15); color: var(--easy); border: 1px solid var(--easy); }
  .diff-Medium { background: rgba(255,136,0,0.15); color: var(--medium); border: 1px solid var(--medium); }
  .diff-Hard { background: rgba(255,51,102,0.15); color: var(--hard); border: 1px solid var(--hard); }

  .card-toggle { color: var(--muted); font-size: 0.8em; transition: transform 0.2s; }
  .card-toggle.open { transform: rotate(180deg); }

  .open-link {
    color: var(--accent2);
    text-decoration: none;
    font-size: 0.75em;
    padding: 4px 10px;
    border: 1px solid var(--accent2);
    border-radius: 4px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .open-link:hover { background: rgba(0,255,204,0.1); box-shadow: 0 0 10px rgba(0,255,204,0.3); }

  /* ANSWER GRID */
  .card-body {
    display: none;
    padding: 20px;
  }
  .card-body.open { display: block; }

  .answer-grid {
    display: grid;
    grid-template-columns: 180px repeat(3, 1fr);
    gap: 4px;
    font-size: 0.78em;
  }
  .grid-corner { background: transparent; }
  .col-head {
    background: rgba(255,20,147,0.15);
    border: 1px solid rgba(255,20,147,0.3);
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
    color: #ff69b4;
    font-weight: bold;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }
  .row-head {
    background: rgba(139,0,255,0.15);
    border: 1px solid rgba(139,0,255,0.3);
    border-radius: 6px;
    padding: 10px 8px;
    color: #da70d6;
    font-weight: bold;
    letter-spacing: 0.5px;
    line-height: 1.3;
    display: flex;
    align-items: center;
  }
  .answer-cell {
    background: rgba(0,255,204,0.05);
    border: 1px solid rgba(0,255,204,0.15);
    border-radius: 6px;
    padding: 10px 8px;
    color: var(--accent2);
    line-height: 1.4;
  }
  .answer-cell .primary {
    color: var(--accent2);
    font-weight: bold;
  }
  .answer-cell .alt {
    color: var(--muted);
    font-size: 0.85em;
    margin-top: 3px;
  }
  .no-answer { color: var(--muted); font-style: italic; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 12px 20px;
    background: rgba(255,215,0,0.05);
    border-top: 1px solid var(--border);
    font-size: 0.75em;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .stat { display: flex; gap: 6px; }
  .stat-label { color: var(--muted); }
  .stat-val { color: var(--accent3); }

  /* JUMP TO TOP */
  .jump-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.2em;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,20,147,0.5);
    transition: all 0.2s;
    z-index: 200;
    display: none;
  }
  .jump-top.visible { display: flex; align-items: center; justify-content: center; }
  .jump-top:hover { transform: scale(1.1); }

  /* SUMMARY RIBBON */
  .summary-ribbon {
    background: linear-gradient(135deg, rgba(255,20,147,0.1), rgba(0,255,204,0.1));
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    align-items: center;
  }
  .ribbon-stat { text-align: center; }
  .ribbon-num { font-family: 'Orbitron', sans-serif; font-size: 1.6em; font-weight: 900; color: var(--accent3); }
  .ribbon-label { font-size: 0.7em; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* RESULT COUNT */
  .result-count {
    color: var(--muted);
    font-size: 0.78em;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .main-content { padding: 15px; }
    .answer-grid { grid-template-columns: 120px repeat(3, 1fr); font-size: 0.7em; }
    .top-bar { padding: 12px 15px; }
    .quiz-dropdown { min-width: 200px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">🎸 80sGrid Admin</div>
    <div class="login-sub">ANSWER KEY — AUTHORIZED ACCESS ONLY</div>
    <input type="password" class="login-input" id="pwInput" placeholder="Enter passphrase" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="login-error" id="loginError">⚠ ACCESS DENIED</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="top-bar">
    <div class="top-title">🎸 80sGrid Admin</div>
    <div class="top-controls">
      <!-- Quick jump dropdown -->
      <select class="quiz-dropdown" id="jumpSelect" onchange="jumpToQuiz(this.value)">
        <option value="">— Jump to quiz —</option>
      </select>
      <input type="text" class="search-input" id="searchInput" placeholder="Search quizzes or artists..." oninput="filterQuizzes()">
      <select class="filter-select" id="diffFilter" onchange="filterQuizzes()">
        <option value="">All difficulties</option>
        <option value="Easy">🟢 Easy</option>
        <option value="Medium">🟠 Medium</option>
        <option value="Hard">🔴 Hard</option>
      </select>
    </div>
  </div>

  <div class="main-content">
    <div class="summary-ribbon" id="summaryRibbon"></div>
    <div class="result-count" id="resultCount"></div>
    <div id="quizList"></div>
  </div>
</div>

<button class="jump-top" id="jumpTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

function doLogin() {
  const val = document.getElementById('pwInput').value.trim().toUpperCase();
  if (val === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    initAdmin();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.style.display = 'none', 2500);
  }
}

function initAdmin() {
  buildSummary();
  buildJumpDropdown();
  renderQuizzes(QUIZ_DATA);
  window.addEventListener('scroll', () => {
    document.getElementById('jumpTopBtn').classList.toggle('visible', window.scrollY > 400);
  });
}

function buildSummary() {
  const easy = QUIZ_DATA.filter(q => q.difficulty === 'Easy').length;
  const med = QUIZ_DATA.filter(q => q.difficulty === 'Medium').length;
  const hard = QUIZ_DATA.filter(q => q.difficulty === 'Hard').length;
  document.getElementById('summaryRibbon').innerHTML = `
    <div class="ribbon-stat"><div class="ribbon-num">${QUIZ_DATA.length}</div><div class="ribbon-label">Total Quizzes</div></div>
    <div class="ribbon-stat"><div class="ribbon-num" style="color:var(--easy)">${easy}</div><div class="ribbon-label">Easy</div></div>
    <div class="ribbon-stat"><div class="ribbon-num" style="color:var(--medium)">${med}</div><div class="ribbon-label">Medium</div></div>
    <div class="ribbon-stat"><div class="ribbon-num" style="color:var(--hard)">${hard}</div><div class="ribbon-label">Hard</div></div>
  `;
}

function buildJumpDropdown() {
  const sel = document.getElementById('jumpSelect');
  QUIZ_DATA.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q.num;
    opt.textContent = `#${q.num} — ${q.name}`;
    sel.appendChild(opt);
  });
}

function jumpToQuiz(num) {
  if (!num) return;
  const el = document.getElementById('card-' + num);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    el.classList.add('highlighted');
    openCard(num);
    setTimeout(() => el.classList.remove('highlighted'), 2000);
  }
  document.getElementById('jumpSelect').value = '';
}

function renderQuizzes(quizzes) {
  const list = document.getElementById('quizList');
  list.innerHTML = '';
  document.getElementById('resultCount').textContent =
    `Showing ${quizzes.length} of ${QUIZ_DATA.length} quizzes`;

  quizzes.forEach(q => {
    const artists = q.cols.join(' · ');
    const diffClass = 'diff-' + q.difficulty;
    const url = q.num === 1 ? 'https://80sgrid.com/' : `https://80sgrid.com/quiz${q.num}.html`;

    // Build answer grid rows
    let gridHTML = `<div class="grid-corner"></div>`;
    q.cols.forEach(c => { gridHTML += `<div class="col-head">${c}</div>`; });

    q.rows.forEach((row, ri) => {
      gridHTML += `<div class="row-head">${row}</div>`;
      q.cols.forEach((col, ci) => {
        const key = ri + '-' + ci;
        const ans = q.answers[key];
        if (ans && ans.length) {
          const primary = ans[0];
          const alts = ans.slice(1);
          gridHTML += `<div class="answer-cell">
            <div class="primary">${capitalize(primary)}</div>
            ${alts.map(a => `<div class="alt">also: ${capitalize(a)}</div>`).join('')}
          </div>`;
        } else {
          gridHTML += `<div class="answer-cell no-answer">—</div>`;
        }
      });
    });

    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'card-' + q.num;
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(${q.num})">
        <span class="quiz-num">#${q.num}</span>
        <span class="quiz-name">${q.name}</span>
        <span class="quiz-artists">${artists}</span>
        <span class="diff-badge ${diffClass}">${q.difficulty}</span>
        <a class="open-link" href="${url}" target="_blank" onclick="event.stopPropagation()">↗ Open</a>
        <span class="card-toggle" id="toggle-${q.num}">▼</span>
      </div>
      <div class="card-body" id="body-${q.num}">
        <div class="answer-grid">${gridHTML}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCard(num) {
  const body = document.getElementById('body-' + num);
  const toggle = document.getElementById('toggle-' + num);
  const header = body.previousElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
  header.classList.toggle('open');
}

function openCard(num) {
  const body = document.getElementById('body-' + num);
  const toggle = document.getElementById('toggle-' + num);
  const header = body.previousElementSibling;
  body.classList.add('open');
  toggle.classList.add('open');
  header.classList.add('open');
}

function filterQuizzes() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const diff = document.getElementById('diffFilter').value;
  const filtered = QUIZ_DATA.filter(q => {
    const matchDiff = !diff || q.difficulty === diff;
    const matchSearch = !search ||
      q.name.toLowerCase().includes(search) ||
      q.cols.join(' ').toLowerCase().includes(search) ||
      q.rows.join(' ').toLowerCase().includes(search) ||
      String(q.num).includes(search);
    return matchDiff && matchSearch;
  });
  renderQuizzes(filtered);
}

function capitalize(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}

// Allow Enter key on password field
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin();
});
</script>
</body>
</html>
